<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnovaSmart - Calculadora de Importación</title>
    <style>
        :root { --gold: #C9A84C; --black: #0A0A0A; --surface: #111111; --text: #F0EDE6; }
        body { background-color: var(--black); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px; border-radius: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--gold); color: black; }
        .bot { align-self: flex-start; background: var(--surface); border: 1px solid var(--gold); }
        .input-area { padding: 20px; background: var(--surface); display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--gold); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div class="message bot">¡Hola! Soy tu asistente de InnovaSmart. ¿Qué producto te gustaría importar hoy?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ej: 10 termos a $20 c/u...">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const container = document.getElementById('chat-container');
            const text = input.value.trim();
            if (!text) return;

            container.innerHTML += `<div class="message user">${text}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            try {
                // ESTA ES LA CONEXIÓN CLAVE A TU VERCEL
                const response = await fetch('https://importar-app.vercel.app/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                container.innerHTML += `<div class="message bot">${data.reply || "No recibí respuesta."}</div>`;
            } catch (error) {
                container.innerHTML += `<div class="message bot" style="color: #ff6666;">Error de conexión. Aseguráte que Vercel esté activo.</div>`;
            }
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
