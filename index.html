<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnovaSmart - Importaciones</title>
    <style>
        :root {
            --gold: #C9A84C;
            --black: #0A0A0A;
            --surface: #111111;
            --text: #F0EDE6;
        }
        body {
            background-color: var(--black);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #chat-header {
            padding: 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--gold);
            text-align: center;
            font-weight: bold;
            color: var(--gold);
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user {
            align-self: flex-end;
            background: var(--gold);
            color: black;
            border-bottom-right-radius: 2px;
        }
        .bot {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-bottom-left-radius: 2px;
        }
        .input-area {
            padding: 20px;
            background: var(--surface);
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }
        input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }
        input:focus { border-color: var(--gold); }
        button {
            background: var(--gold);
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .error { color: #ff6b6b; font-size: 0.9em; text-align: center; }
    </style>
</head>
<body>

    <div id="chat-header">ASISTENTE INNOVASMART</div>

    <div id="chat-container">
        <div class="message bot">¡Hola! Soy tu asistente de InnovaSmart. Contame: ¿Qué producto querés importar, cuánto cuesta y cuánto pesa?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ej: 10 auriculares a $5 c/u desde China">
        <button id="sendBtn">Enviar</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Mostrar mensaje del usuario
            appendMessage(message, 'user');
            userInput.value = '';

            try {
                // LLAMADA DIRECTA A TU VERCEL
                const response = await fetch('https://importar-app.vercel.app/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) throw new Error('Error en el servidor');

                const data = await response.json();
                appendMessage(data.reply || "No recibí respuesta.", 'bot');
                
            } catch (error) {
                appendMessage("Hubo un error. Intentá de nuevo.", 'bot');
                console.error(error);
            }
        }

        function appendMessage(text, side) {
            const div = document.createElement('div');
            div.className = `message ${side}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
